name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore
        working-directory: PomodoroFocus

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: PomodoroFocus

      - name: Run tests
        run: dotnet test --no-build --configuration Release --filter "FullyQualifiedName!~.E2E."
        working-directory: PomodoroFocus

      - name: Publish Blazor WASM
        run: dotnet publish PomodoroFocus.Web/PomodoroFocus.Web.csproj -c Release -o ../release -p:CompressionEnabled=false
        working-directory: PomodoroFocus

      - name: Debug dotnet route mappings
        run: |
          jq -r '.Endpoints[] | select(.Route | test("_framework")) | select(.Route != .AssetFile) | "\(.Route) -> \(.AssetFile)"' release/PomodoroFocus.Web.staticwebassets.endpoints.json

      - name: Prepare static assets for GitHub Pages
        run: |
          FW=release/wwwroot/_framework

          # dotnet.js vive en la raíz del publish en .NET 10; Blazor lo busca en _framework/
          cp release/dotnet.js "$FW/dotnet.js"

          # En .NET 10 los archivos de runtime están fingerprinted con el hash dentro del nombre.
          # GitHub Pages no puede hacer URL rewriting, así que creamos copias canónicas.
          # dotnet.boot.js  → dotnet.{hash}.js   (excluir native y runtime)
          BOOT=$(ls "$FW"/dotnet.*.js 2>/dev/null | grep -vE '(native|runtime)' | head -1)
          [ -n "$BOOT" ] && cp "$BOOT" "$FW/dotnet.boot.js" && echo "dotnet.boot.js <- $(basename $BOOT)"

          # dotnet.native.js  → dotnet.native.{hash}.js
          NATIVE_JS=$(ls "$FW"/dotnet.native.*.js 2>/dev/null | head -1)
          [ -n "$NATIVE_JS" ] && cp "$NATIVE_JS" "$FW/dotnet.native.js" && echo "dotnet.native.js <- $(basename $NATIVE_JS)"

          # dotnet.runtime.js  → dotnet.runtime.{hash}.js
          RUNTIME_JS=$(ls "$FW"/dotnet.runtime.*.js 2>/dev/null | head -1)
          [ -n "$RUNTIME_JS" ] && cp "$RUNTIME_JS" "$FW/dotnet.runtime.js" && echo "dotnet.runtime.js <- $(basename $RUNTIME_JS)"

          # dotnet.native.wasm  → dotnet.native.{hash}.wasm
          NATIVE_WASM=$(ls "$FW"/dotnet.native.*.wasm 2>/dev/null | head -1)
          [ -n "$NATIVE_WASM" ] && cp "$NATIVE_WASM" "$FW/dotnet.native.wasm" && echo "dotnet.native.wasm <- $(basename $NATIVE_WASM)"

          # ICU data  → {name}.{hash}.dat  a  {name}.dat
          for DAT in "$FW"/icudt_*.dat; do
            CANONICAL=$(echo "$DAT" | sed 's/\.[a-z0-9]\{8,12\}\.dat$/.dat/')
            [ "$DAT" != "$CANONICAL" ] && cp "$DAT" "$CANONICAL" && echo "$(basename $CANONICAL) <- $(basename $DAT)"
          done

          # Bootstrap no fue incluido en el proyecto
          mkdir -p release/wwwroot/css/bootstrap
          curl -sL "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" \
            -o release/wwwroot/css/bootstrap/bootstrap.min.css

      - name: Rewrite base href and add SPA fallback for GitHub Pages
        run: |
          $repoName = "${{ github.event.repository.name }}"
          $indexHtml = "release/wwwroot/index.html"
          (Get-Content $indexHtml) -replace '<base href="/" />', "<base href='/$repoName/' />" | Set-Content $indexHtml
          Copy-Item $indexHtml "release/wwwroot/404.html"
        shell: pwsh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

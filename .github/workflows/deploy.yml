name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore
        working-directory: PomodoroFocus

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: PomodoroFocus

      - name: Run tests
        run: dotnet test --no-build --configuration Release --filter "FullyQualifiedName!~.E2E."
        working-directory: PomodoroFocus

      - name: Publish Blazor WASM
        run: dotnet publish PomodoroFocus.Web/PomodoroFocus.Web.csproj -c Release -o ../release --no-build -p:CompressionEnabled=false
        working-directory: PomodoroFocus

      - name: Rewrite base href and add SPA fallback for GitHub Pages
        run: |
          $repoName = "${{ github.event.repository.name }}"
          $indexHtml = "release/wwwroot/index.html"
          (Get-Content $indexHtml) -replace '<base href="/" />', "<base href='/$repoName/' />" | Set-Content $indexHtml
          Copy-Item $indexHtml "release/wwwroot/404.html"
        shell: pwsh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

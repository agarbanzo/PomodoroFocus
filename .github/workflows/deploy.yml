name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore
        working-directory: PomodoroFocus

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: PomodoroFocus

      - name: Run tests
        run: dotnet test --no-build --configuration Release --filter "FullyQualifiedName!~.E2E."
        working-directory: PomodoroFocus

      - name: Publish Blazor WASM
        run: dotnet publish PomodoroFocus.Web/PomodoroFocus.Web.csproj -c Release -o ../release -p:CompressionEnabled=false
        working-directory: PomodoroFocus

      - name: Prepare static assets for GitHub Pages
        run: |
          # dotnet.js vive en la raíz del publish en .NET 10; Blazor lo busca en _framework/
          cp release/dotnet.js release/wwwroot/_framework/dotnet.js

          # Crear copias canónicas de todos los assets fingerprinted usando el mapa de endpoints.
          # GitHub Pages es estático y no puede hacer URL rewriting; el servidor lo haría
          # leyendo staticwebassets.endpoints.json, pero aquí debemos crear los archivos físicos.
          python3 - <<'EOF'
          import json, os, shutil
          with open('release/PomodoroFocus.Web.staticwebassets.endpoints.json') as f:
              data = json.load(f)
          wwwroot = 'release/wwwroot'
          for ep in data.get('Endpoints', []):
              route = ep.get('Route', '').lstrip('/')
              asset = ep.get('AssetFile', '').lstrip('/')
              if route == asset:
                  continue
              src = os.path.join(wwwroot, asset)
              dst = os.path.join(wwwroot, route)
              if os.path.exists(src) and not os.path.exists(dst):
                  os.makedirs(os.path.dirname(dst), exist_ok=True)
                  shutil.copy2(src, dst)
                  print(f'  {asset} -> {route}')
          EOF

          # Bootstrap no fue incluido en el proyecto
          mkdir -p release/wwwroot/css/bootstrap
          curl -sL "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" \
            -o release/wwwroot/css/bootstrap/bootstrap.min.css

      - name: Rewrite base href and add SPA fallback for GitHub Pages
        run: |
          $repoName = "${{ github.event.repository.name }}"
          $indexHtml = "release/wwwroot/index.html"
          (Get-Content $indexHtml) -replace '<base href="/" />', "<base href='/$repoName/' />" | Set-Content $indexHtml
          Copy-Item $indexHtml "release/wwwroot/404.html"
        shell: pwsh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
